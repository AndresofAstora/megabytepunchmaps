<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Megabyte Punch Map</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: #e5e7eb;
}

.hidden { display: none; }

/* MENU */
.menu {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    gap: 30px;
}

.map-btn {
    background: #1a1d24;
    border: 1px solid #2a2f3a;
    padding: 30px 40px;
    cursor: pointer;
    transition: 0.2s ease;
}

.map-btn:hover {
    transform: scale(1.08);
}

/* MAP */
.map-container {
    position: fixed;  /* overlay the landing page */
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: grab;
    background: #0f1115;  /* dark background so underlying menu is hidden */
    z-index: 100;          /* above landing page */
}

.map-container.dragging {
    cursor: grabbing;
}

.map-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform-origin: top left;
}

.map-img {
    display: block;
    max-width: none; /* don't auto-shrink */
    max-height: none;
    user-select: none;
    pointer-events: none; /* allows dragging container instead */
}

#markers {
    position: absolute;
    top: 0;
    left: 0;
}

/* UI */
.back-btn {
    position: absolute;
    top: 15px;
    left: 15px;
    padding: 10px;
    background: #1a1d24;
    border: 1px solid #333;
    cursor: pointer;
    z-index: 10;
}

.zoom-controls {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
}

.zoom-btn {
    margin: 5px 0;
    padding: 10px;
    background: #1a1d24;
    border: 1px solid #333;
    cursor: pointer;
}

.legend {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: #1a1d24;
    padding: 10px;
    border: 1px solid #333;
}

.coords {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #1a1d24;
    padding: 5px 10px;
    border: 1px solid #333;
}

/* MARKERS */
.marker {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
}

.enemy { background: red; }
.loot { background: gold; }

</style>
</head>

<body>

<div id="menu" class="menu">
    <div class="map-btn" data-map="map1">Electro Caves 1</div>
    <div class="map-btn" data-map="map2">Electro Caves 2</div>
    <div class="map-btn" data-map="map3">Electro Caves 3</div>
</div>

<div id="mapView" class="hidden map-container">

    <div class="back-btn">← Back</div>

    <div id="mapWrapper" class="map-wrapper">
        <img id="mapImage" class="map-img" src="">
        <div id="markers"></div>
    </div>

    <div class="zoom-controls">
        <div class="zoom-btn" id="zoomIn">+</div>
        <div class="zoom-btn" id="zoomOut">−</div>
    </div>

    <div class="legend">
        <label><input type="checkbox" checked data-type="enemy"> Enemies</label><br>
        <label><input type="checkbox" checked data-type="loot"> Loot</label><br>
        <button id="toggleAll">Toggle All</button>
    </div>

    <div class="coords" id="coords">X: 0 Y: 0</div>

</div>

<script>
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let startX, startY;

let currentMap = null;

const maps = {
    map1: {
        img: "maps/electrocaves1.png",
        markers: [
            {x: 200, y: 150, type: 'enemy'},
            {x: 400, y: 300, type: 'loot'}
        ]
    },
    map2: {
        img: "maps/electrocaves2.png",
        markers: [
            {x: 100, y: 200, type: 'loot'}
        ]
    },
    map3: {
        img: "maps/electrocaves3.png",
        markers: [
            {x: 500, y: 400, type: 'enemy'}
        ]
    }
};

const menu = document.getElementById('menu');
const mapView = document.getElementById('mapView');
const mapWrapper = document.getElementById('mapWrapper');
const mapImage = document.getElementById('mapImage');
const markersContainer = document.getElementById('markers');

/* BUTTONS */
document.querySelectorAll('.map-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        openMap(btn.dataset.map);
    });
});

document.querySelector('.back-btn').onclick = () => {
    menu.classList.remove('hidden');
    mapView.classList.add('hidden');
};

/* OPEN MAP */
function openMap(key) {
    currentMap = maps[key];
    mapImage.src = currentMap.img;

    menu.classList.add('hidden');
    mapView.classList.remove('hidden');

    // Reset zoom & pan
    scale = 1;
    offsetX = 0;
    offsetY = 0;
    applyTransform();

    loadMarkers();
}

/* MARKERS */
function loadMarkers() {
    markersContainer.innerHTML = '';
    currentMap.markers.forEach(m => {
        const el = document.createElement('div');
        el.className = `marker ${m.type}`;
        el.style.left = m.x + 'px';
        el.style.top = m.y + 'px';
        el.dataset.type = m.type;
        markersContainer.appendChild(el);
    });
}

/* ZOOM */
document.getElementById('zoomIn').onclick = () => zoom(1.2);
document.getElementById('zoomOut').onclick = () => zoom(0.8);

function zoom(factor) {
    scale *= factor;
    applyTransform();
}

function applyTransform() {
    mapWrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

/* PAN */
mapView.addEventListener('mousedown', e => {
    isDragging = true;
    startX = e.clientX - offsetX;
    startY = e.clientY - offsetY;
    mapView.classList.add('dragging');
});

window.addEventListener('mouseup', () => {
    isDragging = false;
    mapView.classList.remove('dragging');
});

window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;
    applyTransform();
});

/* COORDS */
mapImage.addEventListener('mousemove', e => {
    const rect = mapImage.getBoundingClientRect();
    const x = Math.round((e.clientX - rect.left) / scale);
    const y = Math.round((e.clientY - rect.top) / scale);
    document.getElementById('coords').innerText = `X: ${x} Y: ${y}`;
});

/* LEGEND */
document.querySelectorAll('.legend input').forEach(cb => {
    cb.addEventListener('change', () => {
        document.querySelectorAll(`.${cb.dataset.type}`).forEach(el => {
            el.style.display = cb.checked ? 'block' : 'none';
        });
    });
});

document.getElementById('toggleAll').onclick = () => {
    const boxes = document.querySelectorAll('.legend input');
    const allOn = [...boxes].every(b => b.checked);

    boxes.forEach(b => {
        b.checked = !allOn;
        b.dispatchEvent(new Event('change'));
    });
};

/* RESET */
function resetView() {
    scale = 1;
    offsetX = 0;
    offsetY = 0;
    applyTransform();
}

</script>

</body>
</html>
