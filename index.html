<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Megabyte Punch Map</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: #e5e7eb;
}

.hidden { display: none; }

/* MENU */
.menu {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    gap: 30px;
}

.map-btn {
    background: #1a1d24;
    border: 1px solid #2a2f3a;
    border-radius: 10px;
    padding: 30px 40px;
    cursor: pointer;
    transition: 0.2s ease;
}

.map-btn:hover {
    transform: scale(1.08);
}
    
.button-container {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20px;

}

/* MAP */
.map-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: grab;
    background: #000;   /* solid black behind the map */
    z-index: 100;
}

.map-container.dragging {
    cursor: grabbing;
}

.map-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform-origin: top left;
    pointer-events: auto;
}

.map-img {
    display: block;
    max-width: none; /* don't auto-shrink */
    max-height: none;
    user-select: none;
    pointer-events: none; /* allows dragging container instead */
}

#markers {
    position: absolute;
    top: 0;
    left: 0;
}

/* UI */
    /* Unified frosted-glass style for all panels/buttons */
.ui-panel {
    background: rgba(26, 29, 36, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 10px;
    color: #e5e7eb;
    font-family: Arial, sans-serif;
}

.back-btn {
    position: absolute;
    top: 15px;
    left: 15px;
    cursor: pointer;
    text-align: center;
    padding: 8px 12px;
    display: inline-block;
    z-index: 10;
}
.back-btn.ui-panel {
    display: inline-block;
}

.zoom-controls {
    position: absolute;
    top: 15px;
    right: 15px;
    transform: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.zoom-btn {
    width: 36px;
    height: 36px;
    line-height: 36px;
    text-align: center;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: 0.15s;
}

.legend {
    position: absolute;
    top: 70px;
    left: 15px;
    transform: none;
    background: rgba(26, 29, 36, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px;
}

#toggleAll {
    margin-top: 5px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;

    background-color: #333 !important;
    color: #fff !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    text-align: center;

    font-family: inherit !important;
    font-size: 10px !important;
    line-height: 12px !important;
    appearance: none !important;
    -webkit-appearance: none !important;
    -moz-appearance: none !important;
}
#toggleAll:hover {
    background-color: #444 !important;
}

.coords {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #1a1d24;
    padding: 5px 10px;
    border: 1px solid #333;
}

/* MARKERS */
.marker {
    position: absolute;
    width: 24px;          /* adjust size */
    height: 24px;
    transform: translate(-50%, -50%);
    pointer-events: none;

    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}

</style>
</head>

<body>

<div id="menu" class="menu">
    <div class="map-btn" data-map="map1">Electro Caves 1</div>
    <div class="map-btn" data-map="map2">Electro Caves 2</div>
    <div class="map-btn" data-map="map3">Electro Caves 3</div>
    <div class="map-btn" data-map="map4">Lost Megaclopolis 1</div>
    <div class="map-btn" data-map="map5">Lost Megaclopolis 2</div>
    <div class="map-btn" data-map="map6">Lost Megaclopolis 3</div>
</div>

<div id="mapView" class="hidden map-container">

    <div class="back-btn">← Back</div>

    <div id="mapWrapper" class="map-wrapper">
        <img id="mapImage" class="map-img" src="">
        <div id="markers"></div>
    </div>

    <div class="zoom-controls">
        <div class="zoom-btn" id="zoomIn">+</div>
        <div class="zoom-btn" id="zoomOut">−</div>
    </div>

    <div class="legend">
        <label><input type="checkbox" checked data-type="start"> Start</label><br>
        <label><input type="checkbox" checked data-type="checkpoint"> Checkpoint</label><br>
        <label><input type="checkbox" checked data-type="bit-chest"> Bit Chest</label><br>
        <label><input type="checkbox" checked data-type="part-chest"> Part Chest</label><br>
        <label><input type="checkbox" checked data-type="color-capsule"> Color Capsule</label><br>
        <label><input type="checkbox" checked data-type="stage-exit"> Stage Exit</label><br>
        <button id="toggleAll">Toggle All</button>
    </div>

    <div class="coords" id="coords">X: 0 Y: 0</div>

</div>

            {x:1200, y:100, type: 'part-chest'},

            {x:1400, y:100, type: 'part-chest'},
            {x:1500, y:100, type: 'part-chest'},

        ]
    },
};

const markerIcons = {
    start: "maps/marker-start.png",
    checkpoint: "maps/marker-checkpoint.png",
    "bit-chest": "maps/marker-bitchest.png",
    "part-chest": "maps/marker-partchest.png",
    "color-capsule": "maps/marker-colorcapsule.png",
    "stage-exit": "maps/marker-stageexit.png"
};

const menu = document.getElementById('menu');
const mapView = document.getElementById('mapView');
const mapWrapper = document.getElementById('mapWrapper');
const mapImage = document.getElementById('mapImage');
const markersContainer = document.getElementById('markers');

/* BUTTONS */
document.querySelectorAll('.map-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        openMap(btn.dataset.map);
    });
});

document.querySelector('.back-btn').onclick = () => {
    menu.classList.remove('hidden');
    mapView.classList.add('hidden');
};

/* OPEN MAP */
function openMap(key) {
    currentMap = maps[key];
    mapImage.src = currentMap.img;

    menu.classList.add('hidden');
    mapView.classList.remove('hidden');

    // Reset zoom & pan
    scale = 1;
    offsetX = 0;
    offsetY = 0;
    applyTransform();

    loadMarkers();
}

/* MARKERS */
function loadMarkers() {
    markersContainer.innerHTML = '';

    currentMap.markers.forEach(m => {
        const el = document.createElement('div');

        el.className = `marker ${m.type}`;
        el.style.left = m.x + 'px';
        el.style.top = m.y + 'px';

        el.dataset.type = m.type;

        // apply image
        if (markerIcons[m.type]) {
            el.style.backgroundImage = `url(${markerIcons[m.type]})`;
        }

        markersContainer.appendChild(el);
    });
}

/* ZOOM */
document.getElementById('zoomIn').onclick = () => zoom(1.2);
document.getElementById('zoomOut').onclick = () => zoom(0.8);

function zoom(factor) {
    scale *= factor;
    applyTransform();
}

function applyTransform() {
    mapWrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

mapView.addEventListener('wheel', e => {
    e.preventDefault();

    const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;

    const mapX = (e.clientX - offsetX) / scale;
    const mapY = (e.clientY - offsetY) / scale;

    scale *= zoomFactor;
    scale = Math.min(Math.max(scale, 0.2), 5);

    offsetX = e.clientX - mapX * scale;
    offsetY = e.clientY - mapY * scale;

    applyTransform();
}, { passive: false });

mapView.addEventListener('mousedown', e => {
    // ignore UI clicks
    if (e.target.closest('.legend, .zoom-controls, .back-btn')) return;

    isDragging = true;
    startX = e.clientX - offsetX;
    startY = e.clientY - offsetY;
});

window.addEventListener('mouseup', () => {
    isDragging = false;
});

mapView.addEventListener('mousemove', e => {

    // DRAG
    if (isDragging) {
        offsetX = e.clientX - startX;
        offsetY = e.clientY - startY;
        applyTransform();
    }

    // COORDS
    const x = Math.round((e.clientX - offsetX) / scale);
    const y = Math.round((e.clientY - offsetY) / scale);

    document.getElementById('coords').innerText = `X: ${x} Y: ${y}`;
});

mapView.addEventListener('click', e => {
    if (e.target.closest('.legend, .zoom-controls, .back-btn')) return;

    const x = Math.round((e.clientX - offsetX) / scale);
    const y = Math.round((e.clientY - offsetY) / scale);

    const text = `x:${x}, y:${y}`;

    navigator.clipboard?.writeText(text) || prompt("Copy:", text);
});

/* LEGEND */
document.querySelectorAll('.legend input').forEach(cb => {
    cb.addEventListener('change', () => {
        document.querySelectorAll(`.${cb.dataset.type}`).forEach(el => {
            el.style.display = cb.checked ? 'block' : 'none';
        });
    });
});

document.getElementById('toggleAll').onclick = () => {
    const boxes = document.querySelectorAll('.legend input');
    const allOn = [...boxes].every(b => b.checked);

    boxes.forEach(b => {
        b.checked = !allOn;
        b.dispatchEvent(new Event('change'));
    });
};

/* RESET */
function resetView() {
    scale = 1;
    offsetX = 0;
    offsetY = 0;
    applyTransform();
}

</script>

</body>
</html>
